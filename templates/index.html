<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATHI - Smart AI Tech Helper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #fff;
            overflow: hidden;
        }

        /* Animated Background */
        .background {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* Layout */
        .container {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid rgba(56, 189, 248, 0.2);
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 5px;
        }

        .tagline {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .section-title {
            color: #a78bfa;
            font-size: 14px;
            font-weight: 600;
            margin: 20px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #a78bfa, #8b5cf6);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(56, 189, 248, 0.4);
        }

        .note-input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }

        .wiki-input {
            width: 100%;
            padding: 10px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            margin-bottom: 10px;
        }

        /* Main Chat Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(10, 14, 39, 0.6);
        }

        .chat-header {
            padding: 20px 30px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-size: 20px;
            font-weight: 600;
            color: #38bdf8;
        }

        .clear-btn {
            padding: 8px 20px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            border-radius: 6px;
            color: #fca5a5;
            cursor: pointer;
            transition: all 0.3s;
        }

        .clear-btn:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .message {
            margin: 15px 0;
            display: flex;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 60%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
        }

        .message.bot .message-bubble {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: #e2e8f0;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: white;
        }

        .welcome-message {
            text-align: center;
            padding: 40px;
            color: #38bdf8;
            font-size: 18px;
        }

        .welcome-message .sparkle {
            font-size: 24px;
            animation: rotate 2s infinite;
        }

        @keyframes rotate {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(180deg); }
        }

        .chat-input-area {
            padding: 20px 30px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(56, 189, 248, 0.2);
        }

        .input-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 14px 20px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 25px;
            color: white;
            font-size: 15px;
        }

        .chat-input::placeholder {
            color: #64748b;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #a78bfa, #8b5cf6);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(167, 139, 250, 0.5);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: rgba(15, 23, 42, 0.95);
            margin: 5% auto;
            padding: 30px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 15px;
            width: 80%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close {
            color: #94a3b8;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close:hover {
            color: #38bdf8;
        }

        .modal-title {
            color: #38bdf8;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .note-item, .schedule-item {
            background: rgba(30, 41, 59, 0.6);
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 3px solid #38bdf8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background: rgba(239, 68, 68, 0.2);
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            color: #fca5a5;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        .progress-bar {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            color: #94a3b8;
            font-size: 14px;
        }

        .progress-fill {
            height: 8px;
            background: linear-gradient(90deg, #38bdf8, #a78bfa);
            transition: width 0.5s;
            border-radius: 10px;
        }

        .flashcard {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.1), rgba(167, 139, 250, 0.1));
            border: 2px solid rgba(56, 189, 248, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .flashcard:hover {
            transform: scale(1.02);
        }

        .flashcard-label {
            color: #38bdf8;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .flashcard-content {
            font-size: 18px;
            line-height: 1.6;
        }

        .scrollbar-hidden::-webkit-scrollbar {
            width: 8px;
        }

        .scrollbar-hidden::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.3);
        }

        .scrollbar-hidden::-webkit-scrollbar-thumb {
            background: rgba(56, 189, 248, 0.3);
            border-radius: 4px;
        }

        .scrollbar-hidden::-webkit-scrollbar-thumb:hover {
            background: rgba(56, 189, 248, 0.5);
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="background" id="stars"></div>

    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar scrollbar-hidden">
            <div class="logo">SATHI</div>
            <div class="tagline">Smart AI Tech Helper</div>

            <div class="section-title">Quick Actions</div>
            <button class="btn btn-primary" onclick="getTime()">Get Time</button>
            <button class="btn btn-secondary" onclick="getQuote()">Get Quote</button>

            <div class="section-title">Study Tools</div>
            <button class="btn btn-primary" onclick="showSchedule()">Show Today's Schedule</button>
            <button class="btn btn-primary" onclick="showFlashcard()">Get Random Flashcard</button>
            <button class="btn btn-primary" onclick="showProgress()">Show Study Progress</button>

            <div class="section-title">My Notes</div>
            <button class="btn btn-primary" onclick="showNotes()">Show All Notes</button>
            <input type="text" class="note-input" id="noteInput" placeholder="Save a new note...">
            <button class="btn btn-secondary" onclick="saveNote()">Save Note</button>

            <div class="section-title">Web Tools</div>
            <input type="text" class="wiki-input" id="wikiInput" placeholder="Wikipedia topic...">
            <button class="btn btn-primary" onclick="searchWiki()">Search Wikipedia</button>
        </div>

        <!-- Main Chat -->
        <div class="main-content">
            <div class="chat-header">
                <div class="chat-title">SATHI — Chat</div>
                <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
            </div>

            <div class="chat-messages scrollbar-hidden" id="chatMessages">
                <div class="welcome-message">
                    <div>Chat cleared — ready when you are <span class="sparkle">✨</span></div>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-container">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Type your message or use the mic..." onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 class="modal-title" id="modalTitle">Content</h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';

        // Create animated stars
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // Chat functions
        function addMessage(text, isUser = false) {
            const messagesDiv = document.getElementById('chatMessages');
            const welcomeMsg = messagesDiv.querySelector('.welcome-message');
            if (welcomeMsg) welcomeMsg.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            messageDiv.innerHTML = `<div class="message-bubble">${text}</div>`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, true);
            input.value = '';

            try {
                const response = await fetch(`${API_URL}/ask_ai`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: message })
                });
                const data = await response.json();
                addMessage(data.response);

                // Handle actions
                if (data.action === 'show_schedule') showSchedule();
                if (data.action === 'show_progress') showProgress();
                if (data.action === 'show_flashcard') showFlashcard();
                if (data.action === 'show_notes') showNotes();
            } catch (error) {
                addMessage('Sorry, I encountered an error. Please try again.');
            }
        }

        function clearChat() {
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML = '<div class="welcome-message"><div>Chat cleared — ready when you are <span class="sparkle">✨</span></div></div>';
        }

        // Quick Actions
        async function getTime() {
            try {
                const response = await fetch(`${API_URL}/ask_ai`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: 'time' })
                });
                const data = await response.json();
                addMessage(data.response);
            } catch (error) {
                addMessage('Error getting time');
            }
        }

        async function getQuote() {
            try {
                const response = await fetch(`${API_URL}/quote`);
                const data = await response.json();
                addMessage(`"${data.text}" - ${data.author}`);
            } catch (error) {
                addMessage('Error getting quote');
            }
        }

        // Notes
        async function showNotes() {
            try {
                const response = await fetch(`${API_URL}/notes`);
                const data = await response.json();
                
                let html = '';
                if (data.notes.length === 0) {
                    html = '<p style="color: #94a3b8;">No notes yet. Add some from the sidebar!</p>';
                } else {
                    data.notes.forEach(note => {
                        html += `
                            <div class="note-item">
                                <span>${note.text}</span>
                                <button class="delete-btn" onclick="deleteNote(${note.id})">Delete</button>
                            </div>
                        `;
                    });
                }
                
                showModal('My Notes', html);
            } catch (error) {
                addMessage('Error loading notes');
            }
        }

        async function saveNote() {
            const input = document.getElementById('noteInput');
            const note = input.value.trim();
            if (!note) return;

            try {
                await fetch(`${API_URL}/notes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note })
                });
                input.value = '';
                addMessage('Note saved successfully! 📝');
            } catch (error) {
                addMessage('Error saving note');
            }
        }

        async function deleteNote(id) {
            try {
                await fetch(`${API_URL}/notes/${id}`, { method: 'DELETE' });
                showNotes(); // Refresh the list
            } catch (error) {
                addMessage('Error deleting note');
            }
        }

        // Flashcards
        async function showFlashcard() {
            try {
                const response = await fetch(`${API_URL}/flashcard`);
                const data = await response.json();
                
                if (data.error) {
                    addMessage(data.error);
                    return;
                }

                const html = `
                    <div class="flashcard" onclick="this.querySelector('.flashcard-content').style.display = this.querySelector('.flashcard-content').style.display === 'none' ? 'block' : 'none'">
                        <div class="flashcard-label">QUESTION (Click to reveal answer)</div>
                        <div class="flashcard-content">${data.front}</div>
                        <div class="flashcard-content" style="display: none; margin-top: 20px; color: #38bdf8;">
                            <div class="flashcard-label">ANSWER</div>
                            ${data.back}
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="showFlashcard()">Next Flashcard</button>
                `;
                
                showModal('Flashcard', html);
            } catch (error) {
                addMessage('Error loading flashcard');
            }
        }

        // Progress
        async function showProgress() {
            try {
                const response = await fetch(`${API_URL}/progress`);
                const data = await response.json();
                
                let html = '';
                data.subjects.forEach(subject => {
                    html += `
                        <div class="progress-bar">
                            <div class="progress-header">
                                <span>${subject.name}</span>
                                <span>${subject.studied}/${subject.recommended} min (${subject.percentage}%)</span>
                            </div>
                            <div class="progress-fill" style="width: ${subject.percentage}%"></div>
                        </div>
                    `;
                });
                
                showModal('Study Progress', html);
            } catch (error) {
                addMessage('Error loading progress');
            }
        }

        // Schedule
        async function showSchedule() {
            try {
                const response = await fetch(`${API_URL}/schedule`);
                const data = await response.json();
                const day = data.currentDay;
                const schedule = data.schedule[day];
                
                if (!schedule) {
                    addMessage('No schedule found for today');
                    return;
                }

                let html = `<h3 style="color: #38bdf8; margin-bottom: 20px;">${day}'s Schedule</h3>`;
                for (const [time, task] of Object.entries(schedule)) {
                    html += `
                        <div class="schedule-item">
                            <strong style="color: #38bdf8;">${time}</strong>
                            <span style="margin-left: 15px;">${task}</span>
                        </div>
                    `;
                }
                
                showModal(`Today's Schedule`, html);
            } catch (error) {
                addMessage('Error loading schedule');
            }
        }

        // Wikipedia (placeholder - requires backend implementation)
        function searchWiki() {
            const topic = document.getElementById('wikiInput').value.trim();
            if (!topic) return;
            addMessage(`Searching Wikipedia for "${topic}"... (Feature coming soon!)`);
            document.getElementById('wikiInput').value = '';
        }

        // Modal
        function showModal(title, body) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = body;
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }

        // Initial greeting
        setTimeout(() => {
            addMessage("Hello! How can I help you today?");
        }, 500);
    </script>
</body>
</html>
